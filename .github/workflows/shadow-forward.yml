name: Shadow Sync (Push from A)

on:
  # Disabled until real repo URLs are configured in shadow/shadow-config.json.
  # Uncomment the cron schedule when ready:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: shadow-sync-push
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm --prefix shadow ci

      - name: Configure git
        run: |
          git config --global user.name "Shadow Sync"
          git config --global user.email "shadow-sync@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.EXTERNAL_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Push from A into shadow branches on B
        run: npx --prefix shadow tsx shadow/shadow-sync.ts --from a
