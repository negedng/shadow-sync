name: Shadow Sync (Pull from B)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use on the runner.
        type: string
        default: '20'
    secrets:
      EXTERNAL_REPO_TOKEN:
        description: >
          Optional. PAT with Contents: Read+Write on cross-repo push targets.
          Required in orchestrator mode (target-A is not the caller's origin).
          Not needed in workspace mode — GITHUB_TOKEN covers pushes to origin.
        required: false

concurrency:
  group: shadow-sync-pull
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || '20' }}

      - run: npm ci

      - name: Configure git
        env:
          # PAT if provided (required for orchestrator-mode cross-repo pushes);
          # otherwise fall back to the caller's GITHUB_TOKEN which covers
          # pushes to origin in workspace mode.
          TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN || github.token }}
        run: |
          git config --global user.name "Shadow Sync"
          git config --global user.email "shadow-sync@users.noreply.github.com"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Pull from B into shadow branches on A
        run: npm run sync -- --from b
