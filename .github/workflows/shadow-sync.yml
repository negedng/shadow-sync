name: Shadow Sync (Pull from B)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use on the runner.
        type: string
        default: '20'
    secrets:
      EXTERNAL_REPO_TOKEN:
        description: PAT with Contents Read+Write on every repo listed in shadow-config.json.
        required: true

concurrency:
  group: shadow-sync-pull
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || '20' }}

      - run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "Shadow Sync"
          git config --global user.email "shadow-sync@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.EXTERNAL_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Pull from B into shadow branches on A
        run: npm run sync -- --from b
