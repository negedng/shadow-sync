name: Shadow Sync (Pull from B)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use on the runner.
        type: string
        default: '20'

concurrency:
  group: shadow-sync-pull
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || '20' }}

      - run: npm ci

      - name: Pull from B into shadow branches on A
        run: npm run sync -- --from b
