name: Shadow Sync (Pull from B)

on:
  # Disabled until real repo URLs are configured in shadow-config.json.
  # Uncomment the cron schedule when ready:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: shadow-sync-pull
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Pull from B into shadow branches on A
        run: npx tsx shadow-sync.ts --from b
